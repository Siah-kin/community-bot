<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bonzi Vista - by invite</title>
    <meta name="description" content="By invite. Opening soon.">
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" href="/bonzi-logo.png" type="image/png">
    <style>
        :root {
            --purple: #7C3AED;
            --purple-light: #A78BFA;
            --purple-dark: #5B21B6;
            --gold: #d4af37;
            --white: #FFFFFF;
            --black: #0A0A0A;
            --gray: #71717A;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--white);
            color: var(--black);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
        }
        .wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2.25rem;
            max-width: 460px;
            text-align: center;
        }
        .logo { width: 80px; height: 80px; }
        .title {
            font-size: 1.85rem;
            font-weight: 700;
            color: var(--purple-dark);
            letter-spacing: -0.01em;
        }
        .sub {
            font-size: 1rem;
            color: var(--gray);
            margin-top: 0.5rem;
            letter-spacing: 0.02em;
        }
        .caption {
            font-size: 1.05rem;
            color: var(--black);
            line-height: 1.5;
            border-top: 2px solid var(--gold);
            border-bottom: 2px solid var(--gold);
            padding: 1rem 1.5rem;
            font-weight: 500;
        }
        .stake {
            display: inline-block;
            background: var(--purple);
            color: var(--white);
            font-family: inherit;
            font-size: 1.05rem;
            font-weight: 700;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            text-decoration: none;
            padding: 1rem 2.4rem;
            border: 2px solid var(--purple);
            border-radius: 4px;
            transition: background 0.15s, color 0.15s, box-shadow 0.15s;
        }
        .stake:hover, .stake:focus {
            background: var(--white);
            color: var(--purple);
            box-shadow: 0 4px 18px rgba(124, 58, 237, 0.3);
            outline: none;
        }
        footer {
            margin-top: 2.5rem;
            font-size: 0.75rem;
            color: var(--gray);
            letter-spacing: 0.04em;
        }
        @media (prefers-color-scheme: dark) {
            body { background: var(--black); color: var(--white); }
            .title { color: var(--purple-light); }
            .caption { color: var(--white); }
            .stake { background: var(--purple); color: var(--white); }
            .stake:hover, .stake:focus { background: var(--black); color: var(--purple-light); border-color: var(--purple-light); }
            footer { color: #52525B; }
        }
    </style>
</head>
<body>
<main class="wrap">
    <img src="/bonzi-logo.png" alt="Bonzi" class="logo">
    <div>
        <div class="title">Bonzi Vista - by invite</div>
        <div class="sub">Opening soon.</div>
    </div>
    <div class="caption">Badges for your part. Perks build up.</div>
    <a href="/stake.html" class="stake">STAKE BONZI</a>
</main>
<footer>
    &copy; 2026 Bonzi Vista |
    MIT license |
    <a href="/privacy.html">privacy</a> |
    <a href="https://etherfun.app" target="_blank" rel="noopener noreferrer">etherfun.app</a> |
    <a href="https://defiants.org" target="_blank" rel="noopener noreferrer">defiants.org</a> |
    <a href="https://unidosprojects.org" target="_blank" rel="noopener noreferrer">unidosprojects.org</a>
</footer>
</body>
</html>
