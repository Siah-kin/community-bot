<!DOCTYPE html>
<html class="staticrypt-html">
    <head>
        <meta charset="utf-8" />
        <title>This one's locked</title>
        <meta name="viewport" content="width=device-width, initial-scale=1" />

        <!-- do not cache this page -->
        <meta http-equiv="cache-control" content="max-age=0" />
        <meta http-equiv="cache-control" content="no-cache" />
        <meta http-equiv="expires" content="0" />
        <meta http-equiv="expires" content="Tue, 01 Jan 1980 1:00:00 GMT" />
        <meta http-equiv="pragma" content="no-cache" />

        <style>
            .staticrypt-html, .staticrypt-body { height: 100%; }
            .staticrypt-body { margin: 0; }

            .staticrypt-content {
                height: 100%;
                margin: 0;
                background: #0A0A0A;
                color: #FFFFFF;
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
                -webkit-font-smoothing: antialiased;
                -moz-osx-font-smoothing: grayscale;
            }

            .staticrypt-page {
                width: 380px;
                max-width: 90%;
                padding: 9% 0 0;
                margin: auto;
                box-sizing: border-box;
            }

            .staticrypt-form {
                position: relative;
                z-index: 1;
                background: #141414;
                border: 1px solid #7C3AED;
                max-width: 380px;
                margin: 0 auto 100px;
                padding: 36px 34px 34px;
                text-align: center;
                box-sizing: border-box;
            }

            .bonzi-lock {
                width: 132px;
                height: 132px;
                object-fit: contain;
                display: block;
                margin: 0 auto 6px;
            }

            .staticrypt-title {
                font-size: 1.35em;
                font-weight: 700;
                color: #FFFFFF;
                margin: 0 0 10px;
            }

            .bonzi-joke {
                font-size: 0.95em;
                color: #B8B8B8;
                line-height: 1.5;
                margin: 0 0 4px;
            }

            .staticrypt-instructions { margin-bottom: 1.2em; }

            .staticrypt-password-container {
                position: relative;
                outline: 0;
                background: #0A0A0A;
                border: 1px solid #2A2A2A;
                width: 100%;
                margin: 0 0 14px;
                box-sizing: border-box;
            }

            .staticrypt-form input[type="password"],
            .staticrypt-form input[type="text"] {
                background: inherit;
                border: 0;
                box-sizing: border-box;
                color: #FFFFFF;
                font-size: 14px;
                outline: 0;
                padding: 15px 40px 15px 15px;
                width: 100%;
            }

            .staticrypt-form input::placeholder { color: #6A6A6A; }

            .staticrypt-toggle-password-visibility {
                cursor: pointer;
                height: 20px;
                width: 20px;
                opacity: 0.5;
                padding: 13px;
                position: absolute;
                right: 0;
                top: 50%;
                transform: translateY(-50%);
                filter: invert(1);
            }

            .staticrypt-form .staticrypt-decrypt-button {
                text-transform: uppercase;
                letter-spacing: 0.05em;
                outline: 0;
                background: #D4AF37;
                width: 100%;
                border: 0;
                padding: 15px;
                color: #0A0A0A;
                font-size: 14px;
                font-weight: 700;
                cursor: pointer;
            }

            .staticrypt-form .staticrypt-decrypt-button:hover,
            .staticrypt-form .staticrypt-decrypt-button:active,
            .staticrypt-form .staticrypt-decrypt-button:focus {
                background: #D4AF37;
                filter: brightness(108%);
            }

            label.staticrypt-remember {
                display: flex;
                align-items: center;
                justify-content: center;
                margin-bottom: 1em;
                color: #B8B8B8;
                font-size: 0.9em;
            }

            .staticrypt-remember input[type="checkbox"] {
                transform: scale(1.3);
                margin-right: 0.8em;
                accent-color: #7C3AED;
            }

            .hidden { display: none !important; }

            .staticrypt-spinner-container {
                height: 100%;
                display: flex;
                align-items: center;
                justify-content: center;
                background: #0A0A0A;
            }

            .staticrypt-spinner {
                display: inline-block;
                width: 2rem;
                height: 2rem;
                vertical-align: text-bottom;
                border: 0.25em solid #2A2A2A;
                border-right-color: #7C3AED;
                border-radius: 50%;
                animation: spinner-border 0.75s linear infinite;
            }

            @keyframes spinner-border {
                100% { transform: rotate(360deg); }
            }

            @media screen and (-webkit-min-device-pixel-ratio: 0) {
                .staticrypt-form input[type="password"],
                .staticrypt-form input[type="text"] { font-size: 16px; }
            }
        </style>
    </head>

    <body class="staticrypt-body">
