<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bonzi Vista - by invite</title>
    <meta name="description" content="By invite. Opening soon.">
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" href="/bonzi-logo.png" type="image/png">
    <style>
        :root {
            --purple: #7C3AED;
            --purple-light: #A78BFA;
            --purple-dark: #5B21B6;
            --gold: #d4af37;
            --white: #FFFFFF;
            --black: #0A0A0A;
            --gray: #71717A;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--white);
            color: var(--black);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
        }
        .wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2.25rem;
            max-width: 460px;
            text-align: center;
        }
        .logo { width: 80px; height: 80px; }
        .title {
            font-size: 1.85rem;
            font-weight: 700;
            color: var(--purple-dark);
            letter-spacing: -0.01em;
        }
        .sub {
            font-size: 1rem;
            color: var(--gray);
            margin-top: 0.5rem;
            letter-spacing: 0.02em;
        }
        .caption {
            font-size: 1.05rem;
            color: var(--black);
            line-height: 1.5;
            border-top: 2px solid var(--gold);
            border-bottom: 2px solid var(--gold);
            padding: 1rem 1.5rem;
            font-weight: 500;
        }
        .stake {
            display: inline-block;
            background: var(--purple);
            color: var(--white);
            font-family: inherit;
            font-size: 1.05rem;
            font-weight: 700;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            text-decoration: none;
            padding: 1rem 2.4rem;
            border: 2px solid var(--purple);
            border-radius: 4px;
            transition: background 0.15s, color 0.15s, box-shadow 0.15s;
        }
        .stake:hover, .stake:focus {
            background: var(--white);
            color: var(--purple);
            box-shadow: 0 4px 18px rgba(124, 58, 237, 0.3);
            outline: none;
        }
        .site-footer.bonzi-branded-footer {
            background: #111111;
            border: 1px solid #27272A;
            color: #A1A1AA;
            margin: 2.5rem auto 0;
            max-width: 520px;
            padding: 28px 16px 32px;
            text-align: center;
            width: 100%;
        }
        .footer-cto-row, .footer-sponsor-row {
            align-items: center;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            margin-bottom: 14px;
        }
        .footer-cto-row, .footer-sponsor-row { font-size: 17px; font-weight: 700; }
        .footer-pipe { color: #71717A; }
        .footer-cto-row a, .footer-sponsor-row a {
            align-items: center;
            color: #FFFFFF;
            display: inline-flex;
            gap: 8px;
            text-decoration: none;
        }
        .footer-cto-row img { border-radius: 5px; display: block; }
        .footer-sponsor-row svg { display: block; }
        .footer-legal-row { color: #A1A1AA; font-size: 16px; margin-top: 18px; }
        .footer-legal-row a { color: #A1A1AA; text-decoration: none; }
        @media (prefers-color-scheme: dark) {
            body { background: var(--black); color: var(--white); }
            .title { color: var(--purple-light); }
            .caption { color: var(--white); }
            .stake { background: var(--purple); color: var(--white); }
            .stake:hover, .stake:focus { background: var(--black); color: var(--purple-light); border-color: var(--purple-light); }
            .site-footer.bonzi-branded-footer { color: #A1A1AA; }
        }
    </style>
</head>
<body>
<main class="wrap">
    <img src="/bonzi-logo.png" alt="Bonzi" class="logo">
    <div>
        <div class="title">Bonzi Vista - by invite</div>
        <div class="sub">Opening soon.</div>
    </div>
    <div class="caption">Badges for your part. Perks build up.</div>
    <a href="/stake.html" class="stake">STAKE BONZI</a>
</main>
<footer class="site-footer bonzi-branded-footer" aria-label="Site footer">
    <div class="footer-cto-row">
        <span>CTO</span>
        <span class="footer-pipe" aria-hidden="true">|</span>
        <a href="/">
            <img src="/bonzi-logo.png" alt="" width="24" height="24">
            <span>Bonzivista.org</span>
        </a>
    </div>
    <div class="footer-sponsor-row">
        <a href="https://www.ethervista.app/" target="_blank" rel="noopener noreferrer">
            <svg width="17" height="17" viewBox="0 0 100 100" aria-hidden="true"><rect width="100" height="100" fill="#111" rx="8"/><polygon points="50,12 50,50 22,50" fill="#E25555"/><polygon points="50,12 78,50 50,50" fill="#55B855"/><polygon points="22,50 50,88 50,50" fill="#4477CC"/><polygon points="78,50 50,88 50,50" fill="#CCBB44"/></svg>
            <span>Ethervista.app sponsor</span>
        </a>
    </div>
    <div class="footer-legal-row">
        <a href="https://github.com/Siah-kin/community-bot" target="_blank" rel="noopener noreferrer">GITHUB</a><span aria-hidden="true">, </span><a href="/privacy.html">Privacy</a>
    </div>
</footer>
</body>
</html>
