<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bonzi</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" href="/bonzi-logo.png" type="image/png">
    <link rel="stylesheet" href="/css/bonzi-design.css">
    <style>
        body {
            background: var(--black, #0A0A0A);
            color: #FAFAFA;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .holding {
            text-align: center;
            padding: 2rem;
        }
        .holding img {
            width: 96px;
            margin-bottom: 2rem;
        }
        .holding p {
            color: var(--gray, #71717A);
            font-size: 0.9rem;
        }
    </style>
</head>
<body class="dark-mode">
    <div class="holding">
        <img src="/bonzi-logo.png" alt="Bonzi">
        <p>Nothing to see here yet.</p>
    </div>
</body>
</html>
