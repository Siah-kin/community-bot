<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About Bonzi - Community Management on Telegram</title>
    <meta name="description" content="What Bonzi is and what it is not. Plain language. No hype.">
    <meta property="og:type" content="website">
    <meta property="og:title" content="About Bonzi">
    <meta property="og:description" content="What Bonzi is and what it is not. Plain language. No hype.">
    <meta property="og:image" content="https://bonzivista.org/bonzi-logo.png">
    <meta property="og:url" content="https://bonzivista.org/about.html">
    <link rel="canonical" href="https://bonzivista.org/about.html">
    <link rel="icon" href="bonzi-logo.png" type="image/png">
    <link rel="stylesheet" href="css/nav.css">
    <link rel="stylesheet" href="css/bonzi-design.css">
    <script src="js/nav-loader.js?v=20260221" defer></script>

    <style>
        @font-face {
            font-family: 'Bonzi OCR A';
            src: url('assets/fonts/OCRA.otf') format('opentype');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --purple: #7C3AED;
            --purple-light: #A78BFA;
            --purple-dark: #5B21B6;
            --white: #FFFFFF;
            --black: #0A0A0A;
            --gray: #71717A;
            --gray-light: #F4F4F5;
            --gold: #d4af37;
            --terminal-green: #00ff00;
            --terminal-green-dim: #3d7a3d;
            --terminal-green-glow: rgba(0, 255, 0, 0.35);
        }

        html { scroll-behavior: smooth; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--white);
            color: var(--black);
            line-height: 1.6;
        }

        /* Dark mode */
        body.dark-mode {
            background: #0A0A0A;
            color: #FAFAFA;
        }
        body.dark-mode .about-hero h1 { color: #fff; }
        body.dark-mode .about-section { border-top-color: #27272A; }
        body.dark-mode .about-section h2 { color: var(--purple-light); }
        body.dark-mode .about-section p,
        body.dark-mode .about-section li { color: #A1A1AA; }
        body.dark-mode .about-section li strong { color: #fff; }
        body.dark-mode .about-footer { background: #0A0A0A; border-top-color: #27272A; }
        body.dark-mode .about-footer-links a { color: #A1A1AA; }
        body.dark-mode .about-footer-links a:hover { color: #fff; }

        /* Hero */
        .about-hero {
            padding: 140px 40px 60px;
            max-width: 860px;
            margin: 0 auto;
        }

        .about-label {
            display: inline-block;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--purple);
            background: rgba(124, 58, 237, 0.08);
            padding: 5px 12px;
            margin-bottom: 24px;
        }

        .about-hero h1 {
            font-size: clamp(2.5rem, 6vw, 4rem);
            font-weight: 800;
            line-height: 1.05;
            letter-spacing: -2px;
            color: var(--black);
            margin-bottom: 20px;
        }

        .about-hero .lead {
            font-size: 1.15rem;
            color: var(--gray);
            max-width: 620px;
            line-height: 1.7;
        }

        /* Sections */
        .about-body {
            max-width: 860px;
            margin: 0 auto;
            padding: 0 40px 80px;
        }

        .about-section {
            border-top: 1px solid #E4E4E7;
            padding: 48px 0;
        }

        .about-section h2 {
            font-family: 'Bonzi OCR A', 'Courier New', monospace;
            font-size: 0.8rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--purple);
            margin-bottom: 20px;
        }

        .about-section p {
            font-size: 1rem;
            color: #3F3F46;
            line-height: 1.75;
            max-width: 680px;
            margin-bottom: 12px;
        }

        .about-section p:last-child { margin-bottom: 0; }

        .about-list {
            list-style: none;
            padding: 0;
            margin: 0;
            max-width: 680px;
        }

        .about-list li {
            padding: 10px 0 10px 24px;
            position: relative;
            font-size: 1rem;
            color: #3F3F46;
            line-height: 1.65;
            border-bottom: 1px solid #F4F4F5;
        }

        .about-list li:last-child { border-bottom: none; }

        .about-list li::before {
            content: '';
            position: absolute;
            left: 0;
            top: 19px;
            width: 6px;
            height: 6px;
            background: var(--gold);
        }

        .about-list li strong {
            color: var(--black);
            font-weight: 600;
        }

        /* Not-list uses red accent */
        .about-list.not-list li::before {
            background: #DC2626;
        }

        /* Stake CTA section */
        .about-cta {
            border-top: 1px solid #E4E4E7;
            padding: 56px 0 0;
            text-align: center;
        }

        .about-cta p {
            font-size: 1rem;
            color: var(--gray);
            margin-bottom: 28px;
        }

        /* Green stake button - matches euler26 style */
        .btn-stake {
            display: inline-block;
            background: var(--terminal-green);
            color: #000000;
            font-family: 'Bonzi OCR A', 'Courier New', monospace;
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            text-decoration: none;
            padding: 1rem 2.4rem;
            border: 2px solid var(--terminal-green);
            cursor: pointer;
            transition: background 0.15s, box-shadow 0.15s, color 0.15s;
        }

        .btn-stake:hover,
        .btn-stake:focus {
            background: #000000;
            color: var(--terminal-green);
            box-shadow: 0 0 18px var(--terminal-green-glow), inset 0 0 0 2px var(--terminal-green);
            outline: none;
        }

        /* Page footer */
        .about-footer {
            background: var(--gray-light);
            border-top: 1px solid #E4E4E7;
            padding: 28px 40px;
        }

        .about-footer-inner {
            max-width: 860px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
        }

        .about-footer-copy {
            font-size: 0.8rem;
            color: var(--gray);
        }

        .about-footer-links {
            display: flex;
            gap: 20px;
        }

        .about-footer-links a {
            font-size: 0.8rem;
            color: var(--gray);
            text-decoration: none;
            transition: color 0.15s;
        }

        .about-footer-links a:hover {
            color: var(--black);
        }

        /* Responsive */
        @media (max-width: 640px) {
            .about-hero { padding: 120px 20px 40px; }
            .about-body { padding: 0 20px 60px; }
            .about-hero h1 { font-size: 2.2rem; }
            .about-footer { padding: 24px 20px; }
        }
    </style>
</head>
<body>

<div id="nav-container"></div>
<div id="mobile-menu-container"></div>

<main>

    <section class="about-hero">
        <div class="about-label">Bonzi Vista</div>
        <h1>About Bonzi</h1>
        <p class="lead">Plain answers. No pitch.</p>
    </section>

    <div class="about-body">

        <section class="about-section" id="intro">
            <h2>In short</h2>
            <p>BONZI is the token. Telegram is the room. Hardstake is the lock.</p>
            <p>The rest comes with time.</p>
        </section>

        <section class="about-cta" id="stake">
            <a href="/stake-tg.html" class="btn-stake">STAKE BONZI</a>
        </section>

    </div>

</main>

<footer class="about-footer">
    <div class="about-footer-inner">
        <span class="about-footer-copy">&copy; 2026 Bonzi Vista</span>
        <nav class="about-footer-links" aria-label="Footer">
            <a href="/">Home</a>
            <a href="/manifesto.html">Manifesto</a>
            <a href="/privacy.html">Privacy</a>
        </nav>
    </div>
</footer>

</body>
</html>
