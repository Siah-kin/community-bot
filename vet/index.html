<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BonziVista VET</title>
    <meta name="description" content="The future BonziVista ticket and review surface.">
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" href="../bonzi-logo.png" type="image/png">
    <link rel="stylesheet" href="../css/nav.css?v=20260619routes5">
    <link rel="stylesheet" href="../css/bonzi-design.css">
    <script src="../js/nav-loader.js?v=20260623access1" defer></script>
    <script>window.BONZI_LANGS=["en"];</script>
    <style>
        body.stub-page {
            background: #fff;
            color: #18181b;
        }
        body.stub-page.dark-mode {
            background: #0a0a0a;
            color: #f4f4f5;
        }
        .stub-shell {
            width: min(960px, calc(100vw - 48px));
            margin: 0 auto;
            padding: 96px 0 72px;
        }
        .stub-hero {
            display: grid;
            grid-template-columns: minmax(0, 1fr) minmax(180px, 280px);
            gap: 30px;
            align-items: center;
            border-bottom: 1px solid #e4e4e7;
            padding-bottom: 34px;
        }
        .stub-kicker {
            color: #0f9f6e;
            font-size: 0.72rem;
            font-weight: 800;
            letter-spacing: 0.13em;
            text-transform: uppercase;
        }
        h1 {
            margin: 14px 0 16px;
            font-size: clamp(2.15rem, 5vw, 4rem);
            line-height: 1.04;
            letter-spacing: 0;
        }
        .stub-lead {
            max-width: 660px;
            margin: 0;
            color: #52525b;
            font-size: 1.08rem;
            line-height: 1.58;
        }
        .stub-card {
            margin-top: 28px;
            border: 1px solid #e4e4e7;
            border-radius: 8px;
            background: #f8fafc;
            padding: 22px;
        }
        .stub-card strong {
            display: block;
            margin-bottom: 10px;
            font-size: 1.05rem;
        }
        .stub-card p {
            margin: 0;
            color: #52525b;
            line-height: 1.58;
        }
        .stub-hero img {
            width: 100%;
            max-width: 260px;
            justify-self: center;
        }
        body.stub-page.dark-mode .stub-hero {
            border-color: rgba(255,255,255,0.1);
        }
        body.stub-page.dark-mode .stub-lead,
        body.stub-page.dark-mode .stub-card p {
            color: #a1a1aa;
        }
        body.stub-page.dark-mode .stub-card {
            background: #1c1c1f;
            border-color: rgba(255,255,255,0.1);
        }
        @media (max-width: 760px) {
            .stub-shell {
                width: auto;
                margin-left: 16px;
                margin-right: 16px;
                padding-top: 84px;
            }
            .stub-hero {
                grid-template-columns: 1fr;
            }
            .stub-hero img {
                max-width: 220px;
            }
        }
    </style>
</head>
<body class="stub-page" data-theme-default="light">
    <nav id="nav-container"></nav>
    <div id="mobile-menu-container"></div>
    <main class="stub-shell">
        <section class="stub-hero" aria-labelledby="vet-title">
            <div>
                <div class="stub-kicker">VET</div>
                <h1 id="vet-title">Ticket review, when it is ready.</h1>
                <p class="stub-lead">VET will be the place where a community can see its own tickets handled from report to receipt.</p>
            </div>
            <img src="../assets/bonzi/presenting.png" alt="Bonzi presenting ticket review">
        </section>
        <section class="stub-card" aria-label="VET status">
            <strong>Coming soon</strong>
            <p>The first version will start with the visible ticket path. It will not open until the end-to-end record is working.</p>
        </section>
    </main>
</body>
</html>
